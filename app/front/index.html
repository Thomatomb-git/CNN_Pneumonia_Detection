<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pneumonia Detection · Chest X-Ray Classifier</title>
<meta name="description" content="Detect pneumonia from chest X-ray images using VGG16 and DenseNet121 deep learning models." />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --violet-50:#F5F3FF; --violet-100:#EDE9FE; --violet-200:#DDD6FE; --violet-300:#C4B5FD;
  --violet-400:#A78BFA; --violet-500:#8B5CF6; --violet-600:#7C3AED; --violet-700:#6D28D9;
  --violet-800:#5B21B6; --violet-950:#2E1065; --ink:#1E1B4B; --muted:#6B7280;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: var(--violet-50); color: var(--ink); }
body {
  font-family:'Geist','Inter',system-ui,sans-serif;
  font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulseDot { 0%,100%{opacity:.35;transform:scale(.9)} 50%{opacity:1;transform:scale(1.05)} }
@keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.15} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes growBar { from{transform:scaleX(0)} to{transform:scaleX(var(--w,1))} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes floatUp { 0%{transform:translateY(0)} 50%{transform:translateY(-6px)} 100%{transform:translateY(0)} }
@keyframes scanY { 0%{transform:translateY(-120px)} 100%{transform:translateY(100%)} }
@keyframes dashShift { to{stroke-dashoffset:-24} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════ CONFIG & CONSTANTS ═══════════════════════ */

const API_BASE = "https://comvis26-project-model-api-production.up.railway.app";

const MODEL_META = {
  vgg16: { name: "VGG16", layers: 16, params: "138.4M", year: 2014, dim: "224×224", task: "Binary" },
  densenet121: { name: "DenseNet121", layers: 121, params: "8.0M", year: 2017, dim: "224×224", task: "Binary" },
};

/* ═══════════════════════ UTILITIES ═══════════════════════ */

function prettyBytes(n) {
  if (!n) return "—";
  const u = ["B", "KB", "MB", "GB"];
  let i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(n < 10 ? 1 : 0)} ${u[i]}`;
}

function fmtTime(d) { const p = n => String(n).padStart(2,"0"); return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }

/* ═══════════════════════ ICONS ═══════════════════════ */

const Icons = {
  Upload: (p) => <svg viewBox="0 0 24 24" width={p.size||22} height={p.size||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 20h16"/></svg>,
  Image: (p) => <svg viewBox="0 0 24 24" width={p.size||22} height={p.size||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 16l-5-5-8 8"/></svg>,
  Sparkle: (p) => <svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="currentColor" {...p}><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2zM19 14l.9 2.6L22 17l-2.1.4L19 20l-.9-2.6L16 17l2.1-.4L19 14zM5 14l.7 1.9L8 17l-2.3.4L5 19l-.7-1.6L2 17l2.3-.4L5 14z"/></svg>,
  X: (p) => <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>,
  Cpu: (p) => <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="6" y="6" width="12" height="12" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></svg>,
  Check: (p) => <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 12l5 5L20 6"/></svg>,
  Layers: (p) => <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>,
  Refresh: (p) => <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>,
  AlertTriangle: (p) => <svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  Shield: (p) => <svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  Lung: (p) => <svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 4v8"/><path d="M8 12c-2 0-4 1-4 4s1 4 4 4c1.5 0 3-.5 4-2"/><path d="M16 12c2 0 4 1 4 4s-1 4-4 4c-1.5 0-3-.5-4-2"/><circle cx="12" cy="3" r="1"/></svg>,
};

/* ═══════════════════════ STYLES ═══════════════════════ */

const css = `
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

:root {
  --violet-50:#F5F3FF; --violet-100:#EDE9FE; --violet-200:#DDD6FE; --violet-300:#C4B5FD;
  --violet-400:#A78BFA; --violet-500:#8B5CF6; --violet-600:#7C3AED; --violet-700:#6D28D9;
  --violet-800:#5B21B6; --violet-950:#2E1065; --ink:#1E1B4B; --muted:#6B7280;
}

* { margin:0; padding:0; box-sizing:border-box; }
body, #root { font-family:'Geist','Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; color:var(--ink); background:transparent; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulseDot { 0%,100%{opacity:.35;transform:scale(.9)} 50%{opacity:1;transform:scale(1.05)} }
@keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:.15} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes growBar { from{transform:scaleX(0)} to{transform:scaleX(var(--w,1))} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes floatUp { 0%{transform:translateY(0)} 50%{transform:translateY(-6px)} 100%{transform:translateY(0)} }
@keyframes scanY { 0%{transform:translateY(-120px)} 100%{transform:translateY(100%)} }
@keyframes dashShift { to{stroke-dashoffset:-24} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.3)} 50%{box-shadow:0 0 0 12px rgba(124,58,237,0)} }
`;

/* ═══════════════════════ COMPONENTS ═══════════════════════ */

function useNow() {
  const [t, setT] = useState(() => fmtTime(new Date()));
  useEffect(() => { const id = setInterval(() => setT(fmtTime(new Date())), 1000); return () => clearInterval(id); }, []);
  return t;
}

function TopHud({ status, model }) {
  const time = useNow();
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", fontFamily:"'Geist Mono',monospace", fontSize:11, textTransform:"uppercase", letterSpacing:".14em", color:"rgba(109,40,217,.7)" }}>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:"var(--violet-600)", animation:"pulseDot 1.4s ease-in-out infinite" }} />
        <span>pneumonia.detect · v1.0</span>
        <span style={{ opacity:.4 }}>/</span>
        <span>binary</span>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <span>{status}</span>
        <span style={{ opacity:.4 }}>·</span>
        <span>{MODEL_META[model].name.toLowerCase()}</span>
        <span style={{ opacity:.4 }}>·</span>
        <span>{time}</span>
      </div>
    </div>
  );
}

function Header() {
  return (
    <header style={{ textAlign:"center", paddingTop:56 }}>
      <div style={{ display:"inline-flex", alignItems:"center", gap:6, marginBottom:24, padding:"2px 8px", borderRadius:999, fontSize:10, fontWeight:600, letterSpacing:".04em", textTransform:"uppercase", background:"var(--violet-100)", color:"var(--violet-700)" }}>
        <Icons.Lung size={11} /> Medical imaging
      </div>
      <h1 style={{ fontSize:"clamp(44px,8vw,84px)", lineHeight:.95, fontWeight:600, letterSpacing:"-.035em", color:"var(--ink)" }}>
        Pneumonia{" "}
        <span style={{ fontFamily:"'Instrument Serif',Georgia,serif", fontStyle:"italic", fontWeight:400, color:"var(--violet-700)", letterSpacing:"-.01em" }}>Detection</span>
      </h1>
      <p style={{ marginTop:16, fontSize:15, color:"#6B7280", maxWidth:440, marginLeft:"auto", marginRight:"auto" }}>
        Chest X-ray classification powered by VGG16 &amp; DenseNet121 deep learning models.
      </p>
    </header>
  );
}

function StepLabel({ n, title, hint }) {
  return (
    <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", gap:12 }}>
      <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
        <span style={{ fontFamily:"'Geist Mono',monospace", fontSize:11, color:"#9CA3AF", letterSpacing:".08em", fontVariantNumeric:"tabular-nums" }}>{n}</span>
        <span style={{ fontSize:13, fontWeight:500, color:"var(--ink)" }}>{title}</span>
      </div>
      <span style={{ fontFamily:"'Geist Mono',monospace", fontSize:10.5, textTransform:"uppercase", letterSpacing:".14em", color:"#9CA3AF", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"55%" }}>{hint}</span>
    </div>
  );
}

function CornerBrackets({ active }) {
  const c = active ? "#7C3AED" : "rgba(124,58,237,.45)";
  return (
    <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", overflow:"visible" }} viewBox="0 0 100 100" preserveAspectRatio="none">
      {[[14,14,""],[86,14,"rotate(90)"],[86,86,"rotate(180)"],[14,86,"rotate(270)"]].map(([x,y,rot],i) => (
        <g key={i} transform={`translate(${x},${y}) scale(.5)`}>
          <g transform={rot}><path d={`M0 18 L0 0 L18 0`} stroke={c} strokeWidth={2.5} fill="none" strokeLinecap="round"/></g>
        </g>
      ))}
    </svg>
  );
}

function DropZone({ image, onFile, onClear, isClassifying }) {
  const inputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);

  const handleFiles = useCallback(files => {
    const file = files && files[0];
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = e => onFile({ name: file.name, size: file.size, type: file.type, dataUrl: e.target.result, file: file });
    reader.readAsDataURL(file);
  }, [onFile]);

  if (image) {
    return (
      <div style={{ position:"relative", borderRadius:24, background:"#fff", overflow:"hidden", boxShadow:"0 1px 2px rgba(30,27,75,.04), 0 8px 24px -8px rgba(124,58,237,.18)", border:"1px solid rgba(124,58,237,.08)" }}>
        <div style={{ position:"relative", width:"100%", aspectRatio:"16/10" }}>
          <img src={image.dataUrl} alt={image.name} style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"contain", background:"rgba(245,243,255,.4)" }} />
          {isClassifying && (
            <div style={{ position:"absolute", inset:0, pointerEvents:"none", overflow:"hidden", borderRadius:"inherit" }}>
              <div style={{ position:"absolute", left:0, right:0, height:120, background:"linear-gradient(to bottom, transparent, rgba(124,58,237,.35), transparent)", animation:"scanY 1.6s cubic-bezier(.5,0,.5,1) infinite", mixBlendMode:"screen" }} />
            </div>
          )}
          <CornerBrackets active={isClassifying} />
          <button onClick={onClear} style={{ position:"absolute", top:12, right:12, display:"inline-flex", alignItems:"center", gap:6, borderRadius:999, background:"rgba(255,255,255,.9)", backdropFilter:"blur(8px)", padding:"6px 10px", fontSize:11, fontWeight:500, color:"var(--violet-700)", border:"1px solid var(--violet-200)", cursor:"pointer" }}>
            <Icons.X /> Remove
          </button>
          <div style={{ position:"absolute", bottom:12, left:12, right:12, display:"flex", alignItems:"flex-end", justifyContent:"space-between", gap:12, pointerEvents:"none" }}>
            <div style={{ pointerEvents:"auto", display:"inline-flex", alignItems:"center", gap:8, borderRadius:999, background:"rgba(255,255,255,.9)", backdropFilter:"blur(8px)", padding:"6px 12px", fontSize:11, color:"#4B5563", border:"1px solid var(--violet-100)" }}>
              <Icons.Image size={12} />
              <span style={{ fontWeight:500, color:"#1F2937", maxWidth:180, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{image.name}</span>
              <span style={{ opacity:.5 }}>·</span>
              <span style={{ fontFamily:"'Geist Mono',monospace" }}>{prettyBytes(image.size)}</span>
            </div>
            <div style={{ pointerEvents:"auto", display:"inline-flex", alignItems:"center", gap:8, borderRadius:999, background:"rgba(255,255,255,.9)", backdropFilter:"blur(8px)", padding:"6px 12px", fontSize:11, color:"#4B5563", border:"1px solid var(--violet-100)", fontFamily:"'Geist Mono',monospace" }}>
              224×224 · pre-processed
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div
      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
      onClick={() => inputRef.current?.click()}
      role="button" tabIndex={0}
      onKeyDown={e => { if (e.key==="Enter"||e.key===" ") inputRef.current?.click(); }}
      style={{ position:"relative", borderRadius:24, background:"#fff", boxShadow:"0 1px 2px rgba(30,27,75,.04), 0 8px 24px -8px rgba(124,58,237,.18)", cursor:"pointer", overflow:"hidden", aspectRatio:"16/10", transform: dragOver ? "scale(1.01)" : "scale(1)", transition:"transform .2s ease" }}
    >
      <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }} preserveAspectRatio="none">
        <rect x="6" y="6" width="calc(100% - 12px)" height="calc(100% - 12px)" rx="22" ry="22" fill="none" stroke={dragOver?"#7C3AED":"#C4B5FD"} strokeWidth={dragOver?2:1.6} strokeDasharray="8 8" style={{ animation:"dashShift 18s linear infinite" }} />
      </svg>

      <div style={{ position:"absolute", inset:0, opacity:.6, backgroundImage:"repeating-linear-gradient(45deg, rgba(167,139,250,.06) 0 8px, transparent 8px 16px)" }} />
      <div style={{ position:"absolute", inset:0, opacity:.3, backgroundImage:"radial-gradient(rgba(124,58,237,.18) 1px, transparent 1px)", backgroundSize:"14px 14px", maskImage:"radial-gradient(ellipse at center, black 30%, transparent 70%)", WebkitMaskImage:"radial-gradient(ellipse at center, black 30%, transparent 70%)" }} />

      <div style={{ position:"relative", height:"100%", width:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 24px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20 }}>
          <span style={{ height:1, width:32, background:"var(--violet-300)" }} />
          <span style={{ fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", fontSize:10, color:"rgba(109,40,217,.7)" }}>step 01</span>
          <span style={{ height:1, width:32, background:"var(--violet-300)" }} />
        </div>

        <div style={{ position:"relative", animation:"floatUp 4.6s ease-in-out infinite" }}>
          <div style={{ position:"absolute", inset:-16, borderRadius:"50%", background:"rgba(221,214,254,.4)", filter:"blur(24px)" }} />
          <div style={{ position:"relative", display:"grid", placeItems:"center", width:64, height:64, borderRadius:16, background:"linear-gradient(180deg, var(--violet-100), #fff)", border:"1px solid var(--violet-200)", boxShadow:"inset 0 1px 0 rgba(255,255,255,.6), 0 1px 2px rgba(30,27,75,.04)", color:"var(--violet-700)" }}>
            <Icons.Upload />
          </div>
        </div>

        <h3 style={{ marginTop:24, fontSize:"clamp(22px,4vw,30px)", letterSpacing:"-.015em", color:"var(--ink)", fontWeight:600 }}>
          Drop a chest X-ray to <span style={{ fontFamily:"'Instrument Serif',Georgia,serif", fontStyle:"italic", fontWeight:400, color:"var(--violet-700)" }}>analyze</span>.
        </h3>
        <p style={{ marginTop:8, fontSize:14, color:"#6B7280", maxWidth:320 }}>
          Drag &amp; drop a file here, or click to browse. Chest X-ray image — JPG or PNG.
        </p>

        <div style={{ marginTop:24, display:"flex", flexWrap:"wrap", alignItems:"center", justifyContent:"center", gap:8 }}>
          {[["Image","224×224"],["Cpu","cloud inference"],["Lung","VGG16 / DenseNet"]].map(([icon,text]) => (
            <span key={text} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 9px", borderRadius:999, fontSize:11, border:"1px solid var(--violet-200)", background:"#fff", color:"var(--violet-700)", fontWeight:500, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".14em" }}>
              {icon==="Image"?<Icons.Image size={11}/>:icon==="Cpu"?<Icons.Cpu/>:<Icons.Lung size={11}/>} {text}
            </span>
          ))}
        </div>
      </div>

      <input ref={inputRef} type="file" accept="image/jpeg,image/png" style={{ display:"none" }} onChange={e => handleFiles(e.target.files)} />
    </div>
  );
}

function ModelToggle({ model, onChange, disabled }) {
  const isLeft = model === "vgg16";
  return (
    <div style={{ background:"#fff", border:"1px solid var(--violet-200)", boxShadow:"0 1px 2px rgba(30,27,75,.04)", borderRadius:14, padding:4, position:"relative", display:"grid", gridTemplateColumns:"1fr 1fr" }} role="radiogroup">
      <div style={{ position:"absolute", top:4, bottom:4, width:"calc(50% - 4px)", background:"linear-gradient(180deg, #7C3AED, #6D28D9)", borderRadius:10, boxShadow:"0 4px 12px -4px rgba(124,58,237,.5), 0 1px 0 rgba(255,255,255,.2) inset", transition:"transform .28s cubic-bezier(.2,.8,.2,1)", transform:`translateX(${isLeft?"0%":"100%"})` }} />
      {[{ key:"vgg16", title:"VGG16", meta:"16 layers · 138M" }, { key:"densenet121", title:"DenseNet121", meta:"121 layers · 8M" }].map(m => (
        <button key={m.key} onClick={() => !disabled && onChange(m.key)} style={{ position:"relative", zIndex:1, padding:"12px 14px", borderRadius:10, fontWeight:500, letterSpacing:"-.01em", color: model===m.key?"#fff":"var(--violet-700)", display:"flex", alignItems:"center", justifyContent:"center", gap:10, transition:"color .25s ease", border:"none", background:"transparent", cursor: disabled?"not-allowed":"pointer", fontFamily:"inherit" }}>
          <span style={{ display:"flex", flexDirection:"column", alignItems:"center", lineHeight:1.3 }}>
            <span style={{ display:"flex", alignItems:"center", gap:6 }}>
              <Icons.Layers />
              <span style={{ fontWeight:600, letterSpacing:"-.01em" }}>{m.title}</span>
            </span>
            <span style={{ fontSize:10.5, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".1em", opacity:.75, marginTop:2 }}>{m.meta}</span>
          </span>
        </button>
      ))}
    </div>
  );
}

function Spinner({ color = "white" }) {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" style={{ animation:"spin 0.9s linear infinite" }}>
      <circle cx="12" cy="12" r="9" stroke={color === "white" ? "rgba(255,255,255,.35)" : "rgba(124,58,237,.2)"} strokeWidth="3" fill="none"/>
      <path d="M21 12a9 9 0 0 0-9-9" stroke={color} strokeWidth="3" fill="none" strokeLinecap="round"/>
    </svg>
  );
}

function DotsAnim() {
  return (
    <span style={{ display:"inline-flex", width:"1.6ch", justifyContent:"flex-start" }}>
      {[0,150,300].map(d => <span key={d} style={{ animation:`blink 1.1s steps(1) infinite`, animationDelay:`${d}ms` }}>.</span>)}
    </span>
  );
}

function ClassifyButton({ disabled, loading, onClick }) {
  const bg = disabled && !loading ? { background:"#E5E7EB", color:"#9CA3AF", boxShadow:"none", cursor:"not-allowed" } :
    { background:"linear-gradient(180deg, #8B5CF6 0%, #7C3AED 45%, #6D28D9 100%)", color:"#fff", boxShadow:"0 1px 0 rgba(255,255,255,.25) inset, 0 8px 20px -6px rgba(124,58,237,.55), 0 1px 2px rgba(30,27,75,.08)", cursor:"pointer" };

  return (
    <button onClick={onClick} disabled={disabled} style={{ ...bg, width:"100%", fontSize:15, fontWeight:500, letterSpacing:"-.01em", padding:"16px 0", borderRadius:16, border:"none", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:10, position:"relative", overflow:"hidden", fontFamily:"inherit" }}>
      {loading && <span style={{ position:"absolute", inset:0, opacity:.6 }}><span style={{ position:"absolute", top:0, bottom:0, width:"50%", background:"linear-gradient(to right, transparent, rgba(255,255,255,.4), transparent)", animation:"sweep 1.2s linear infinite" }} /></span>}
      <span style={{ position:"relative", display:"inline-flex", alignItems:"center", gap:10 }}>
        {loading ? <><Spinner /> <span>Analyzing<DotsAnim /></span></> : <><Icons.Sparkle /> <span>Analyze X-ray</span></>}
      </span>
    </button>
  );
}

function ClassifyingPlaceholder({ model }) {
  const phases = ["Connecting to server...", `Loading ${MODEL_META[model].name} model...`, "Analyzing X-ray image...", "Processing results..."];
  const [idx, setIdx] = useState(0);
  const [showColdStart, setShowColdStart] = useState(false);
  useEffect(() => { const id = setInterval(() => setIdx(i => (i+1)%phases.length), 400); return () => clearInterval(id); }, []);
  useEffect(() => { const id = setTimeout(() => setShowColdStart(true), 8000); return () => clearTimeout(id); }, []);

  return (
    <section style={{ borderRadius:24, background:"#fff", boxShadow:"0 1px 2px rgba(30,27,75,.04), 0 8px 24px -8px rgba(124,58,237,.18)", border:"1px solid var(--violet-100)", padding:"24px 28px", animation:"fadeIn .4s ease-out both" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <Spinner color="var(--violet-600)" />
        <div style={{ flex:1 }}>
          <div style={{ fontSize:11, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:"rgba(109,40,217,.7)" }}>working</div>
          <div style={{ fontSize:15, color:"var(--ink)", marginTop:2, fontWeight:500, animation:"fadeIn .4s ease-out both" }} key={idx}>{phases[idx]}</div>
        </div>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"2px 8px", borderRadius:999, fontSize:10, background:"var(--violet-100)", color:"var(--violet-700)", fontWeight:600, letterSpacing:".04em", textTransform:"uppercase" }}>{MODEL_META[model].name}</span>
      </div>
      <div style={{ marginTop:16, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ height:8, borderRadius:999, background:"var(--violet-100)", overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:999, width:"100%", background:"linear-gradient(90deg, #C4B5FD, #7C3AED, #C4B5FD)", backgroundSize:"200% 100%", animation:"shimmer 1.6s linear infinite" }} />
          </div>
        ))}
      </div>
      {showColdStart && (
        <div style={{ marginTop:16, padding:"10px 14px", borderRadius:12, background:"rgba(245,158,11,.08)", border:"1px solid rgba(245,158,11,.2)", fontSize:12, color:"#92400E", display:"flex", alignItems:"center", gap:8, animation:"fadeIn .4s ease-out both" }}>
          <Icons.AlertTriangle size={14} style={{ color:"#F59E0B", flexShrink:0 }} />
          <span>Server sedang cold start, harap tunggu sebentar...</span>
        </div>
      )}
    </section>
  );
}

function ErrorCard({ message, onRetry }) {
  return (
    <section style={{ borderRadius:24, background:"#fff", border:"1px solid rgba(244,63,94,.2)", boxShadow:"0 1px 2px rgba(30,27,75,.04), 0 8px 24px -8px rgba(244,63,94,.15)", padding:"28px", animation:"fadeUp .5s ease-out both" }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
        <div style={{ display:"grid", placeItems:"center", width:40, height:40, borderRadius:12, background:"rgba(244,63,94,.08)", color:"#E11D48", flexShrink:0 }}>
          <Icons.AlertTriangle size={20} />
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:11, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:"#E11D48", marginBottom:4 }}>Error</div>
          <p style={{ fontSize:14, color:"#4B5563", lineHeight:1.5 }}>{message}</p>
        </div>
      </div>
      <button onClick={onRetry} style={{ marginTop:16, width:"100%", padding:"12px 0", borderRadius:12, border:"1px solid rgba(244,63,94,.2)", background:"rgba(244,63,94,.04)", color:"#E11D48", fontSize:13, fontWeight:500, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, fontFamily:"inherit", transition:"background .2s" }}>
        <Icons.Refresh /> Coba lagi
      </button>
    </section>
  );
}

function Results({ results, model, runId, durationMs, onAgain }) {
  if (!results) return null;
  const meta = MODEL_META[model];
  const isPneumonia = results.label === "PNEUMONIA";
  const confidence = results.confidence * 100;

  const palette = isPneumonia
    ? { fill:"linear-gradient(90deg,#F43F5E,#E11D48)", text:"#E11D48", bg:"rgba(244,63,94,.06)", iconBg:"rgba(244,63,94,.1)", border:"rgba(244,63,94,.15)", badgeBg:"#FFF1F2", badgeText:"#BE123C", glow:"rgba(244,63,94,.25)" }
    : { fill:"linear-gradient(90deg,#10B981,#059669)", text:"#059669", bg:"rgba(16,185,129,.06)", iconBg:"rgba(16,185,129,.1)", border:"rgba(16,185,129,.15)", badgeBg:"#ECFDF5", badgeText:"#065F46", glow:"rgba(16,185,129,.25)" };

  return (
    <section key={runId} style={{ animation:"fadeUp .6s cubic-bezier(.2,.7,.2,1) both", borderRadius:24, background:"#fff", boxShadow:`0 1px 2px rgba(30,27,75,.06), 0 24px 48px -16px ${palette.glow}`, border:`1px solid ${palette.border}`, overflow:"hidden" }}>
      {/* Header strip */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, padding:"16px 28px", borderBottom:`1px solid ${palette.border}`, background:palette.bg }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:11, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:palette.text }}>
          <Icons.Check /> Analysis complete
          <span style={{ opacity:.4 }}>·</span>
          <span>{(durationMs/1000).toFixed(2)}s</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 9px", borderRadius:999, fontSize:11, border:"1px solid var(--violet-200)", background:"#fff", color:"var(--violet-700)", fontWeight:500 }}><Icons.Cpu /> {meta.name}</span>
          <button onClick={onAgain} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 9px", borderRadius:999, fontSize:11, border:"1px solid var(--violet-200)", background:"#fff", color:"var(--violet-700)", fontWeight:500, cursor:"pointer", fontFamily:"inherit" }}><Icons.Refresh /> Again</button>
        </div>
      </div>

      {/* Main result */}
      <div style={{ padding:"32px 28px 28px", textAlign:"center" }}>
        {/* Icon */}
        <div style={{ display:"inline-grid", placeItems:"center", width:64, height:64, borderRadius:20, background:palette.iconBg, marginBottom:20 }}>
          {isPneumonia
            ? <Icons.AlertTriangle size={28} style={{ color:palette.text }} />
            : <Icons.Shield size={28} style={{ color:palette.text }} />
          }
        </div>

        {/* Badge */}
        <div style={{ marginBottom:8 }}>
          <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 12px", borderRadius:999, fontSize:11, fontWeight:600, letterSpacing:".06em", textTransform:"uppercase", background:palette.badgeBg, color:palette.badgeText }}>
            {isPneumonia ? "Pneumonia Detected" : "Normal — No Pneumonia"}
          </span>
        </div>

        {/* Label */}
        <h2 style={{ fontSize:"clamp(36px,6vw,56px)", lineHeight:1.02, fontWeight:600, letterSpacing:"-.03em", color:palette.text, marginTop:8 }}>
          {results.label}
        </h2>

        {/* Confidence */}
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"center", gap:4, fontFamily:"'Geist Mono',monospace", marginTop:12 }}>
          <span style={{ fontSize:"clamp(28px,5vw,40px)", fontWeight:600, color:palette.text, letterSpacing:"-.02em", fontVariantNumeric:"tabular-nums" }}>{confidence.toFixed(1)}</span>
          <span style={{ color:palette.text, fontSize:18, opacity:.7 }}>%</span>
          <span style={{ fontSize:12, color:"#9CA3AF", marginLeft:8, textTransform:"uppercase", letterSpacing:".14em" }}>confidence</span>
        </div>

        {/* Bar */}
        <div style={{ marginTop:16, height:14, borderRadius:999, background:"#F3F4F6", overflow:"hidden", maxWidth:400, marginLeft:"auto", marginRight:"auto" }}>
          <div style={{ height:"100%", borderRadius:999, transformOrigin:"left center", animation:"growBar .9s cubic-bezier(.2,.8,.2,1) both", "--w":confidence/100, background:palette.fill }} />
        </div>
      </div>

      {/* Footer meta */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", borderTop:`1px solid ${palette.border}`, background:palette.bg }}>
        {[["Model",meta.name],["Label",results.label],["Confidence",`${confidence.toFixed(1)}%`],["Time",`${(durationMs/1000).toFixed(2)}s`]].map(([k,v],i) => (
          <div key={k} style={{ padding:"12px 16px", borderLeft: i>0?`1px solid ${palette.border}`:"none" }}>
            <div style={{ fontSize:10, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:"#9CA3AF" }}>{k}</div>
            <div style={{ marginTop:2, fontSize:14, fontWeight:500, color:"var(--ink)" }}>{v}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function ResultsPlaceholder({ hasImage }) {
  return (
    <section style={{ borderRadius:24, border:"1px dashed var(--violet-200)", background:"rgba(255,255,255,.4)", padding:"32px 24px", textAlign:"center", animation:"fadeIn .4s ease-out both" }}>
      <div style={{ display:"inline-flex", alignItems:"center", gap:8, fontSize:11, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:"rgba(109,40,217,.6)" }}>
        <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:"var(--violet-400)", animation:"pulseDot 1.4s ease-in-out infinite" }} />
        Awaiting input
      </div>
      <p style={{ marginTop:8, fontSize:14, color:"#6B7280" }}>
        {hasImage ? "Tekan 'Analyze X-ray' untuk memulai analisis." : "Upload gambar chest X-ray untuk memulai. Hasil akan muncul di sini."}
      </p>
    </section>
  );
}

/* ═══════════════════════ MAIN APP ═══════════════════════ */

function App() {
  const [image, setImage] = useState(null);
  const [model, setModel] = useState("vgg16");
  const [phase, setPhase] = useState("idle");        // idle | classifying | done | error
  const [results, setResults] = useState(null);
  const [runId, setRunId] = useState(0);
  const [durationMs, setDurationMs] = useState(0);
  const [error, setError] = useState(null);

  useEffect(() => { if (!image) { setResults(null); setPhase("idle"); setError(null); } }, [image]);

  const onClassify = useCallback(async () => {
    if (!image || !image.file) return;
    setPhase("classifying");
    setResults(null);
    setError(null);
    const start = performance.now();

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 90000);

      const formData = new FormData();
      formData.append("file", image.file);

      const res = await fetch(`${API_BASE}/predict?model=${model}`, {
        method: "POST",
        body: formData,
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || `Server error (${res.status})`);
      }

      const data = await res.json();
      setResults(data);
      setDurationMs(performance.now() - start);
      setRunId(n => n + 1);
      setPhase("done");
    } catch (err) {
      if (err.name === "AbortError") {
        setError("Request timeout (90s) — server kemungkinan sedang cold start. Silakan coba lagi.");
      } else if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
        setError("Tidak dapat terhubung ke server. Pastikan koneksi internet Anda stabil dan coba lagi.");
      } else {
        setError(err.message || "Terjadi kesalahan yang tidak diketahui.");
      }
      setPhase("error");
    }
  }, [image, model]);

  const prevModel = useRef(model);
  useEffect(() => {
    if (prevModel.current !== model) {
      prevModel.current = model;
      if (image && phase !== "classifying") onClassify();
    }
  }, [model]);

  const status = phase==="classifying"?"analyzing":phase==="done"?"ready · last run ok":phase==="error"?"error":image?"image ready":"awaiting upload";

  return (
    <>
      <style>{css}</style>
      <div style={{ minHeight:"100vh", position:"relative", backgroundImage:"radial-gradient(1200px 600px at 50% -10%, rgba(124,58,237,.18), transparent 60%), radial-gradient(800px 500px at 90% 100%, rgba(167,139,250,.12), transparent 60%), linear-gradient(to bottom, #F5F3FF, #FBFAFF 40%, #F5F3FF)" }}>
        {/* Grid lines ornament */}
        <div style={{ position:"absolute", inset:0, pointerEvents:"none", backgroundImage:"linear-gradient(to right, rgba(124,58,237,.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(124,58,237,.06) 1px, transparent 1px)", backgroundSize:"32px 32px", maskImage:"radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 80%)", WebkitMaskImage:"radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 80%)", opacity:.6 }} />

        <div style={{ position:"relative", maxWidth:760, margin:"0 auto", padding:"0 28px 96px" }}>
          <div style={{ paddingTop:24 }}>
            <TopHud status={status} model={model} />
          </div>

          <Header />

          <main style={{ marginTop:56, display:"flex", flexDirection:"column", gap:28 }}>
            <StepLabel n="02" title="Chest X-ray image" hint={image ? image.name : "drop or browse"} />
            <DropZone image={image} onFile={setImage} onClear={() => setImage(null)} isClassifying={phase==="classifying"} />

            <StepLabel n="03" title="Model" hint={`${MODEL_META[model].name} · ${MODEL_META[model].layers} layers · ${MODEL_META[model].params}`} />
            <ModelToggle model={model} onChange={setModel} disabled={phase==="classifying"} />

            <StepLabel n="04" title="Analyze" hint={image?"ready":"needs image"} />
            <ClassifyButton disabled={!image || phase==="classifying"} loading={phase==="classifying"} onClick={onClassify} />

            <div style={{ paddingTop:12 }}>
              <StepLabel n="05" title="Result" hint={results ? `${results.label} · ${(results.confidence*100).toFixed(1)}%` : "—"} />
              <div style={{ marginTop:16 }}>
                {phase==="classifying" && <ClassifyingPlaceholder model={model} />}
                {phase==="error" && <ErrorCard message={error} onRetry={onClassify} />}
                {phase==="done" && results && <Results key={runId} runId={runId} results={results} model={model} durationMs={durationMs} onAgain={onClassify} />}
                {phase!=="classifying" && phase!=="error" && !results && <ResultsPlaceholder hasImage={!!image} />}
              </div>
            </div>

            <footer style={{ paddingTop:40, paddingBottom:8, textAlign:"center", fontSize:11, fontFamily:"'Geist Mono',monospace", textTransform:"uppercase", letterSpacing:".16em", color:"#9CA3AF" }}>
              <div style={{ display:"inline-flex", alignItems:"center", gap:8 }}>
                <span>powered by FastAPI</span>
                <span style={{ opacity:.4 }}>·</span>
                <span>model hosted on Railway</span>
              </div>
            </footer>
          </main>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
